<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="css/styles.css">
    <title>Matraka</title>
    <link rel="apple-touch-icon" sizes="120x120" href="favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
    <link rel="manifest" href="favicon/site.webmanifest">
    <meta name="msapplication-TileColor" content="#da532c">
    <meta name="theme-color" content="#ffffff">
    <meta name="description" content="The ultimate Experience Creators">
    <style>
        body {
          height: 100vh;
        }
        .skip-intro {
          position: absolute;
          right:30px;
          top:45px;
        }

        .intro-logo {
          position: relative;
          top:50%;
          transform: translateY(-50%);
        }

        .intro-logo img{
          max-width: 270px;
          margin: 0 auto;
          display: block;

        }

        @media (max-width: 767px) {

          .skip-intro {
            position: absolute;
            right:15px;
            top:25px;
          }

          .intro-logo img{
            max-width: 180px;
          }
        }
    </style>
  </head>
    

  <body>

    <div class="skip-intro">
      <a href="/" class="link__arrow--left">Skip Intro</a>
    </div>

    <div class="intro-logo">
      <img src="img/svg/icon-matraka.svg" alt="Matraka">
    </div>

    <div class="intro-curtain"></div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.4/jquery.min.js"></script>
    <script>
      $(document).ready(function() {
        setTimeout(function() {
          $('.intro-logo').addClass('logo-move');
        }, 1000)
      });
      $(document).ready(function() {
        $('body').fadeIn(1680);
        // $('.sesbania-gif').attr('src', function(i, a) {
        //   $(this).attr('src', '').delay(1200).fadeIn().attr('src', a);
        // });
      });
      $(window).on('beforeunload', function() {
        $("body").fadeOut("slow");
      });
      $(window).load(function() {});
    </script>
</body>


</html>
