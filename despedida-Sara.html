        autoplay: {
          delay: 2500,
          disableOnInteraction: false,
        },
        navigation: {
          nextEl: ".swiper-button-next",
          prevEl: ".swiper-button-prev",
        },
        pagination: {
          el: ".swiper-pagination",
          clickable: true,
        },
      });

      // class to create a countdown timer
      class CountdownTimer {
          // setup timer values
          constructor({ selector, targetDate, backgroundColor = null, foregroundColor = null }) {
              this.selector = selector;
              this.targetDate = targetDate;
              this.backgroundColor = backgroundColor;
              this.foregroundColor = foregroundColor;

              // grab divs on frontend using supplied selector ID
              this.refs = {
                  days: document.querySelector(`${this.selector} [data-value="days"]`),
                  hours: document.querySelector(`${this.selector} [data-value="hours"]`)
              };
          }

          getTimeRemaining(endtime) {
              const total = Date.parse(endtime) - Date.parse(new Date());
              const days = Math.floor(total / (1000 * 60 * 60 * 24));
              const hours = Math.floor((total / (1000 * 60 * 60)) % 24);
              return {
                  total,
                  days,
                  hours,
              };
          }

          updateTimer({ days, hours}) {
              this.refs.days.textContent = days;
              this.refs.hours.textContent = hours;
          }

          updateColors() {
              if (this.backgroundColor != null) {
                  this.refs.days.style.background = this.backgroundColor;
                  this.refs.hours.style.background = this.backgroundColor;
              }

              if (this.foregroundColor != null) {
                  this.refs.days.style.color = this.foregroundColor;
                  this.refs.hours.style.color = this.foregroundColor;
              }
          }

          startTimer() {
              const timer = this.getTimeRemaining(this.targetDate);
              this.updateTimer(timer);
              this.updateColors();
              setInterval(() => {
                  const timer = this.getTimeRemaining(this.targetDate);
                  this.updateTimer(timer);
              }, 1000);
          }
      }

      var audio = document.getElementById('audio');
      var isPlaying = false;
      audio.volume = 0.05;

      $('.btn-play-music').click(function(){
          $(this).toggleClass('pause');
          $(this).parent('.music-box').toggleClass('playing');
          // $(this).find('.fa').toggleClass('fa-pause');
          if (isPlaying) {
            audio.pause()
          } else {
            audio.play();
          }
      });
      audio.onplaying = function() {
        isPlaying = true;
      };
      audio.onpause = function() {
        isPlaying = false;
      };

      const timer = new CountdownTimer({
          selector: ".clock1",
          targetDate: new Date("August, 25 2023 17:00:00"),
      });

      timer.startTimer(); 
    </script>


  </body>
