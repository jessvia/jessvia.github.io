<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="css/styles.css">
    <title>Matraka</title>
    <link rel="apple-touch-icon" sizes="120x120" href="favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
    <link rel="manifest" href="favicon/site.webmanifest">
    <meta name="msapplication-TileColor" content="#da532c">
    <meta name="theme-color" content="#ffffff">
    <meta name="description" content="The ultimate Experience Creators">
  </head>

  <body>


    <main class="splash">

      <div class="header">
        <div class="header--logo">
          <img src="img/svg/logo_matraka.svg" alt="">
        </div>
        <div class="header--socials">
          <span class="d-none d-md-inline-flex">Síguenos en redes</span>
          <ul>
            <li><a class="socials__ig" href="https://www.instagram.com/agenciamatraka/" target="_blank"></a></li>
          </ul>
        </div>
      </div>

      <section class="splash__section">
        <div id="pause"></div>
        <div class="splash--video">
          <video id="video" height="100%" width="100%" allowfullscreen src="https://player.vimeo.com/external/312030462.hd.mp4?s=c9841e82964a4d7e315a97001fdac812133d5a96&profile_id=175" frameborder="0" loop playsinline></video>
        </div>

        <div class="img-original">
          <img class="word-image" src="img/svg/word-original.svg" alt="Matraka">
          <img class="word-hover" src="img/svg/word-glitch.svg" alt="Matraka">
          <button id="play">Play <img src="img/svg/play.svg" alt="Pause Video"></button>
        </div>

      </section>
    </main>

    <script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>
    <script>
    
      var vid = document.getElementById("video");
      var pauseButton = document.querySelector("#play");
      var pauseHTML = document.querySelector("#pause");
      var container = document.querySelector(".splash--video");

      if (window.matchMedia('(prefers-reduced-motion)').matches) {
          vid.removeAttribute("autoplay");
          vid.pause();
          pauseButton.innerHTML = "Play";
      }

      function vidFade() {
        vid.classList.add("stopfade");
      }

      vid.addEventListener('ended', function()
      {
      // only functional if "loop" is removed 
      vid.pause();
      // to capture IE10
      vidFade();
      }); 

      pauseButton.addEventListener("click", function() {
        vid.classList.toggle("stopfade");
        if (vid.paused) {
          vid.play();
          $('.img-original').fadeOut();
          $('#pause').show();
        } else {
          vid.pause();
        } 
      })

      pauseHTML.addEventListener("click", function() {
        vid.classList.toggle("stopfade");
        if (vid.paused) {
          vid.play();
          container.classList.add("active");
          $('.img-original').fadeOut();
          $('#pause').show();
        } else {
          vid.pause();
          container.classList.remove("active");
          $('.img-original').fadeIn();
          $('#pause').hide();
        } 
      })

    </script>

  </body>

</html>
